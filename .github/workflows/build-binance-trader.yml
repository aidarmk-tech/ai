name: Build Binance Trader APK

on:
  push:
    branches: [ "claude/binance-trading-bot-apk-yaud0x", "main", "master" ]
    paths:
      - "binance-trader/**"
      - ".github/workflows/build-binance-trader.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Build Release APK
        working-directory: binance-trader
        run: gradle assembleRelease --no-daemon --stacktrace -PverCode=${{ github.run_number }} -PverName=1.0.${{ github.run_number }}

      - name: Stage APK
        run: |
          mkdir -p dist
          cp binance-trader/app/build/outputs/apk/release/app-release.apk dist/BinanceTrader.apk
          ls -lh dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BinanceTrader-${{ github.run_number }}
          path: dist/BinanceTrader.apk
          retention-days: 30

      # Rolling-релиз со стабильной ссылкой, чтобы APK можно было скачать
      # прямо на телефон без входа в GitHub Actions.
      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: binance-trader
          name: Binance Trader (последняя сборка)
          body: "Автосборка #${{ github.run_number }}. Скачайте BinanceTrader.apk и установите на телефон."
          prerelease: true
          files: dist/BinanceTrader.apk
