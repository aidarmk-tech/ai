name: Build Lampa Player APK

on:
  push:
    branches: [ "claude/code-from-spec-tE7mA", "main", "master" ]
    paths:
      - "lampa-player-native/**"
      - ".github/workflows/build-lampa-player.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"
          cache-read-only: false

      - name: Generate Gradle wrapper
        working-directory: lampa-player-native
        run: gradle wrapper --gradle-version=8.7 --distribution-type=bin

      - name: Build Debug APK
        working-directory: lampa-player-native
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LampaPlayer-debug-${{ github.run_number }}
          path: lampa-player-native/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK size
        working-directory: lampa-player-native
        run: ls -lh app/build/outputs/apk/debug/app-debug.apk
