name: Build Lampa Player APK

on:
  push:
    branches: [ "claude/code-from-spec-tE7mA", "claude/lampplayer-android-tv-BNB6g", "main", "master" ]
    paths:
      - "lampa-player-native/**"
      - "lmnp.js"
      - ".github/workflows/build-lampa-player.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      # Prefer the keystore from secrets (KEYSTORE_B64 = base64 of lampplayer.jks);
      # fall back to the repo copy until the secret is configured.
      - name: Restore signing keystore
        run: |
          mkdir -p lampa-player-native/keystore
          if [ -n "${{ secrets.KEYSTORE_B64 }}" ]; then
            echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > lampa-player-native/keystore/lampplayer.jks
            echo "Using keystore from secrets"
          elif [ -f lampa-player-native/keystore/lampplayer.jks ]; then
            echo "Using keystore from repo (add KEYSTORE_B64 secret to remove it)"
          else
            echo "No keystore available" && exit 1
          fi

      - name: Build Debug APK
        working-directory: lampa-player-native
        run: gradle assembleDebug --no-daemon --stacktrace -PverCode=${{ github.run_number }} -PverName=1.0.${{ github.run_number }}

      - name: Stage APK
        run: |
          mkdir -p dist
          # Immutable per-build name for the auto-updater (a reused URL lets GitHub's
          # CDN serve stale bytes after re-upload → sha256 mismatch → "не прошёл проверку").
          cp lampa-player-native/app/build/outputs/apk/debug/app-debug.apk dist/LampPlayer-${{ github.run_number }}.apk
          # Stable alias for manual installs.
          cp dist/LampPlayer-${{ github.run_number }}.apk dist/LampPlayer.apk
          ls -lh dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LampaPlayer-debug-${{ github.run_number }}
          path: dist/LampPlayer.apk
          retention-days: 30

      # ── Auto-update publishing (main only): APK + version.json as release assets ──
      - name: Write version.json
        if: github.ref == 'refs/heads/main'
        run: |
          SHA256=$(sha256sum dist/LampPlayer-${{ github.run_number }}.apk | cut -d' ' -f1)
          cat > dist/version.json <<EOF
          {
            "versionCode": ${{ github.run_number }},
            "versionName": "1.0.${{ github.run_number }}",
            "url": "https://github.com/${{ github.repository }}/releases/download/auto/LampPlayer-${{ github.run_number }}.apk",
            "sha256": "$SHA256",
            "notes": "Авто-сборка #${{ github.run_number }}"
          }
          EOF
          cat dist/version.json

      - name: Publish rolling release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto
          name: LampPlayer (auto)
          body: "Rolling auto-update build #${{ github.run_number }}"
          files: |
            dist/LampPlayer-${{ github.run_number }}.apk
            dist/LampPlayer.apk
            dist/version.json

      # Delete previous per-build APKs so the 'auto' release doesn't grow unbounded.
      # Runs AFTER publish, so the new versioned APK is already uploaded before we prune.
      - name: Prune old APK assets (main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          keep="LampPlayer-${{ github.run_number }}.apk"
          ids=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/auto" \
                  --jq ".assets[] | select(.name|test(\"^LampPlayer-[0-9]+\\\\.apk$\")) | select(.name != \"$keep\") | .id" 2>/dev/null || true)
          for id in $ids; do
            echo "deleting old apk asset id=$id"
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$id" || true
          done
