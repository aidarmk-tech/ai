name: Build Lampa Player APK

on:
  push:
    branches: [ "claude/code-from-spec-tE7mA", "claude/lampplayer-android-tv-BNB6g", "main", "master" ]
    paths:
      - "lampa-player-native/**"
      - "lmnp.js"
      - ".github/workflows/build-lampa-player.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Build Debug APK
        working-directory: lampa-player-native
        run: gradle assembleDebug --no-daemon --stacktrace -PverCode=${{ github.run_number }} -PverName=1.0.${{ github.run_number }}

      - name: Stage APK
        run: |
          mkdir -p dist
          cp lampa-player-native/app/build/outputs/apk/debug/app-debug.apk dist/LampPlayer.apk
          ls -lh dist/LampPlayer.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LampaPlayer-debug-${{ github.run_number }}
          path: dist/LampPlayer.apk
          retention-days: 30

      # ── Auto-update publishing (main only) ──────────────────────────────
      - name: Publish rolling release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto
          name: LampPlayer (auto)
          body: "Rolling auto-update build #${{ github.run_number }}"
          files: dist/LampPlayer.apk

      - name: Update version.json on Pages (main)
        if: github.ref == 'refs/heads/main'
        run: |
          cat > version.json <<EOF
          {
            "versionCode": ${{ github.run_number }},
            "versionName": "1.0.${{ github.run_number }}",
            "url": "https://github.com/${{ github.repository }}/releases/download/auto/LampPlayer.apk",
            "notes": "Авто-сборка #${{ github.run_number }}"
          }
          EOF
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add version.json
          git diff --staged --quiet || git commit -m "chore: publish update version.json #${{ github.run_number }} [skip ci]"
          git pull --rebase origin main || true
          git push origin HEAD:main
