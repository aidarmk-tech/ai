name: Build Lampa Player APK

on:
  push:
    branches: [ "claude/code-from-spec-tE7mA", "claude/lampplayer-android-tv-BNB6g", "main", "master" ]
    paths:
      - "lampa-player-native/**"
      - "lmnp.js"
      - ".github/workflows/build-lampa-player.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Build Debug APK
        working-directory: lampa-player-native
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LampaPlayer-debug-${{ github.run_number }}
          path: lampa-player-native/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK size
        run: ls -lh lampa-player-native/app/build/outputs/apk/debug/app-debug.apk
